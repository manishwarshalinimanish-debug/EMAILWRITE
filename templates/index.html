<!DOCTYPE html>
<html>
<head>
    <title>AI Email Chat</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
        }

        .header {
            background: #111827;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
        }

        .chat {
            height: 80vh;
            overflow-y: auto;
            padding: 15px;
        }

        .msg {
            max-width: 70%;
            padding: 12px;
            margin: 10px;
            border-radius: 10px;
            white-space: pre-wrap;
        }

        .user {
            background: #3b82f6;
            color: white;
            margin-left: auto;
            text-align: right;
        }

        .bot {
            background: #e5e7eb;
            color: black;
            margin-right: auto;
        }

        .input-box {
            display: flex;
            padding: 10px;
            background: #111827;
        }

        input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
        }

        button {
            margin-left: 10px;
            padding: 12px 20px;
            border: none;
            background: #22c55e;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>

<body>

<div class="header">💬 AI Email Generator Chat</div>

<div class="chat" id="chat"></div>

<div class="input-box">
    <input type="text" id="topic" placeholder="Type: leave, apology, festival..." />
    <button onclick="send()">Send</button>
</div>

<script>
function addMessage(text, type) {
    let div = document.createElement("div");
    div.classList.add("msg", type);
    div.innerText = text;
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = 99999;
}

function send() {
    let topic = document.getElementById("topic").value;
    if (!topic) return;

    addMessage(topic, "user");

    fetch("/generate", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "topic=" + topic
    })
    .then(res => res.text())
    .then(data => {
        addMessage(data, "bot");
    });

    document.getElementById("topic").value = "";
}
</script>

</body>
</html>
