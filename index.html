<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Email Generator</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #4f46e5, #06b6d4);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .card {
        background: white;
        width: 420px;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        text-align: center;
    }

    h1 {
        margin-bottom: 10px;
        color: #333;
    }

    p {
        font-size: 14px;
        color: gray;
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 10px;
        outline: none;
        font-size: 15px;
        margin-bottom: 15px;
        transition: 0.3s;
    }

    input:focus {
        border-color: #4f46e5;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #4f46e5;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #3730a3;
    }

    .tag {
        margin-top: 15px;
        font-size: 12px;
        color: #888;
    }

    .box {
        margin-top: 15px;
        background: #f3f4f6;
        padding: 10px;
        border-radius: 10px;
        font-size: 13px;
        color: #333;
    }
</style>

</head>

<body>

<div class="card">

    <h1>✉ AI Email Generator</h1>
    <p>Enter a topic and generate a formal college email instantly</p>

    <form action="/generate" method="POST">
        <input type="text" name="topic" placeholder="e.g. festival leave, apology, invitation" required>
        <button type="submit">Generate Email</button>
    </form>

    <div class="tag">Powered by Flask + Python</div>

</div>

</body>
</html>
